{% extends "base.html" %}

{% block title %}Set up your profile — Scan2Count{% endblock %}

{% block content %}
<div class="bg-white rounded-2xl shadow p-6">
    <div class="text-3xl mb-2">👋</div>
    <h1 class="text-2xl font-bold text-gray-800 mb-1">Tell us about yourself</h1>
    <p class="text-gray-500 text-sm mb-6">
        We'll calculate your daily calorie and macro targets.
    </p>

    {% if error %}
    <div class="bg-red-50 border border-red-200 text-red-700 text-sm rounded-xl px-4 py-3 mb-4">
        {{ error }}
    </div>
    {% endif %}

    <form action="/onboarding" method="post" class="space-y-5">

        <!-- Name -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1" for="name">
                Your name
            </label>
            <input
                id="name" name="name" type="text" required
                class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm
                       focus:outline-none focus:ring-2 focus:ring-green-400"
                placeholder="e.g. Arjun"
            >
        </div>

        <!-- Date of birth -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1" for="dob">
                Date of birth
            </label>
            <input
                id="dob" name="dob" type="date" required
                class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm
                       focus:outline-none focus:ring-2 focus:ring-green-400"
            >
        </div>

        <!-- Sex -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Sex</label>
            <div class="grid grid-cols-2 gap-3">
                <label class="flex items-center gap-2 border border-gray-300 rounded-xl px-4 py-2.5
                              cursor-pointer has-[:checked]:border-green-500 has-[:checked]:bg-green-50">
                    <input type="radio" name="sex" value="M" required class="accent-green-500">
                    <span class="text-sm text-gray-700">Male</span>
                </label>
                <label class="flex items-center gap-2 border border-gray-300 rounded-xl px-4 py-2.5
                              cursor-pointer has-[:checked]:border-green-500 has-[:checked]:bg-green-50">
                    <input type="radio" name="sex" value="F" class="accent-green-500">
                    <span class="text-sm text-gray-700">Female</span>
                </label>
            </div>
        </div>

        <!-- Weight + Height side by side -->
        <div class="grid grid-cols-2 gap-3">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1" for="weight_kg">
                    Weight (kg)
                </label>
                <input
                    id="weight_kg" name="weight_kg" type="number"
                    min="20" max="300" step="0.1" required
                    class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm
                           focus:outline-none focus:ring-2 focus:ring-green-400"
                    placeholder="65"
                >
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1" for="height_cm">
                    Height (cm)
                </label>
                <input
                    id="height_cm" name="height_cm" type="number"
                    min="100" max="250" step="0.5" required
                    class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm
                           focus:outline-none focus:ring-2 focus:ring-green-400"
                    placeholder="170"
                >
            </div>
        </div>

        <!-- Activity level -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1" for="activity_level">
                Activity level
            </label>
            <select
                id="activity_level" name="activity_level" required
                class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm
                       focus:outline-none focus:ring-2 focus:ring-green-400 bg-white"
            >
                <option value="" disabled selected>Choose one…</option>
                <option value="sedentary">Sedentary — desk job, little exercise</option>
                <option value="light">Light — exercise 1–3 days/week</option>
                <option value="moderate">Moderate — exercise 3–5 days/week</option>
                <option value="active">Active — hard exercise 6–7 days/week</option>
            </select>
        </div>

        <!-- Goal -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Your goal</label>
            <div class="space-y-2">
                <label class="flex items-center gap-3 border border-gray-300 rounded-xl px-4 py-3
                              cursor-pointer has-[:checked]:border-green-500 has-[:checked]:bg-green-50">
                    <input type="radio" name="goal" value="lose" required class="accent-green-500">
                    <div>
                        <p class="text-sm font-medium text-gray-800">Lose weight</p>
                        <p class="text-xs text-gray-500">500 kcal daily deficit</p>
                    </div>
                </label>
                <label class="flex items-center gap-3 border border-gray-300 rounded-xl px-4 py-3
                              cursor-pointer has-[:checked]:border-green-500 has-[:checked]:bg-green-50">
                    <input type="radio" name="goal" value="maintain" class="accent-green-500">
                    <div>
                        <p class="text-sm font-medium text-gray-800">Maintain weight</p>
                        <p class="text-xs text-gray-500">Eat at your TDEE</p>
                    </div>
                </label>
                <label class="flex items-center gap-3 border border-gray-300 rounded-xl px-4 py-3
                              cursor-pointer has-[:checked]:border-green-500 has-[:checked]:bg-green-50">
                    <input type="radio" name="goal" value="gain" class="accent-green-500">
                    <div>
                        <p class="text-sm font-medium text-gray-800">Gain muscle</p>
                        <p class="text-xs text-gray-500">300 kcal daily surplus</p>
                    </div>
                </label>
            </div>
        </div>

        <button
            type="submit"
            class="w-full bg-green-500 hover:bg-green-600 text-white font-semibold
                   py-3 rounded-xl transition-colors text-sm"
        >
            Calculate my targets →
        </button>

    </form>
</div>
{% endblock %}
