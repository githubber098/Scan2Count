<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FoodScan{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

    <!-- Navbar -->
    <nav class="bg-white shadow-sm px-4 py-3 flex items-center justify-between">
        <span class="text-green-600 font-bold text-lg">🥗 FoodScan</span>
        <a href="#" class="text-sm text-gray-500">Log in</a>
    </nav>

    <!-- Page content -->
    <main class="max-w-md mx-auto px-4 py-6">
        {% block content %}{% endblock %}
    </main>

</body>
</html>
