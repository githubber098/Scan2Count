{% extends "base.html" %}

{% block title %}Log a meal — Scan2Count{% endblock %}

{% block content %}

<div class="mb-5">
    <h1 class="text-2xl font-bold text-gray-800">Log a meal</h1>
    <p class="text-gray-500 text-sm">Take a photo or pick one from your gallery.</p>
</div>

{% if error %}
<div class="bg-red-50 border border-red-200 text-red-700 text-sm rounded-xl px-4 py-3 mb-4">
    {{ error }}
</div>
{% endif %}

<form action="/log" method="post" enctype="multipart/form-data" id="log-form">

    <!-- Tap-to-shoot zone -->
    <label
        for="photo"
        id="drop-label"
        class="block w-full border-2 border-dashed border-gray-300 rounded-2xl p-10
               text-center cursor-pointer hover:border-green-400 transition-colors"
    >
        <div id="label-content">
            <div class="text-5xl mb-3">📸</div>
            <p class="text-gray-600 font-medium">Tap to take a photo</p>
            <p class="text-gray-400 text-xs mt-1">or pick from gallery · JPEG / PNG / WebP · max 5 MB</p>
        </div>
        <img id="preview" class="hidden mx-auto max-h-64 rounded-xl mt-4 object-contain" alt="preview">
    </label>

    <!-- Hidden on mobile, camera opens automatically -->
    <input
        id="photo" name="photo" type="file"
        accept="image/*" capture="environment"
        class="hidden"
        required
    >

    <button
        type="submit" id="submit-btn"
        class="hidden mt-4 w-full bg-green-500 hover:bg-green-600 text-white
               font-semibold py-4 rounded-2xl text-center transition-colors text-base shadow"
    >
        Analyse photo →
    </button>

    <div id="loading" class="hidden mt-6 text-center">
        <div class="inline-block w-8 h-8 border-4 border-green-500 border-t-transparent
                    rounded-full animate-spin mb-3"></div>
        <p class="text-gray-500 text-sm">Identifying food…</p>
        <p class="text-gray-400 text-xs mt-1">This takes about 5 seconds.</p>
    </div>

</form>

<script>
const input      = document.getElementById('photo');
const preview    = document.getElementById('preview');
const submitBtn  = document.getElementById('submit-btn');
const labelText  = document.getElementById('label-content');
const form       = document.getElementById('log-form');
const loading    = document.getElementById('loading');

input.addEventListener('change', () => {
    const file = input.files[0];
    if (!file) return;
    preview.src = URL.createObjectURL(file);
    preview.classList.remove('hidden');
    labelText.classList.add('hidden');
    submitBtn.classList.remove('hidden');
});

form.addEventListener('submit', () => {
    submitBtn.classList.add('hidden');
    loading.classList.remove('hidden');
});
</script>

{% endblock %}
