{% extends "base.html" %}

{% block title %}FoodScan — Track your meals{% endblock %}

{% block content %}

<!-- Hero card -->
<div class="bg-white rounded-2xl shadow p-6 mb-4 text-center">
    <div class="text-5xl mb-3">📸</div>
    <h1 class="text-2xl font-bold text-gray-800 mb-2">Track meals instantly</h1>
    <p class="text-gray-500 text-sm mb-6">
        Photograph your food. Get macros. Stay on target.
    </p>
    <a href="/signup"
       class="block w-full bg-green-500 hover:bg-green-600 text-white font-semibold 
              py-3 rounded-xl transition-colors">
        Get started
    </a>
    <a href="/login"
       class="block w-full mt-3 text-green-600 font-medium py-2 text-sm">
        Already have an account? Log in
    </a>
</div>

<!-- Feature pills -->
<div class="grid grid-cols-3 gap-3 text-center">
    <div class="bg-white rounded-xl p-3 shadow-sm">
        <div class="text-2xl mb-1">🇮🇳</div>
        <p class="text-xs text-gray-600 font-medium">Indian foods</p>
    </div>
    <div class="bg-white rounded-xl p-3 shadow-sm">
        <div class="text-2xl mb-1">⚡</div>
        <p class="text-xs text-gray-600 font-medium">Instant analysis</p>
    </div>
    <div class="bg-white rounded-xl p-3 shadow-sm">
        <div class="text-2xl mb-1">🎯</div>
        <p class="text-xs text-gray-600 font-medium">Goal tracking</p>
    </div>
</div>

{% endblock %}
