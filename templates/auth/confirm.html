{% extends "base.html" %}
{% block title %}Confirming your account…{% endblock %}
{% block content %}

<div class="bg-white rounded-2xl shadow p-6 text-center">
    <div class="text-4xl mb-3">⏳</div>
    <p class="text-gray-600 text-sm" id="msg">Confirming your account…</p>
</div>

<script>
    // Supabase puts the JWT in the URL hash — it never hits the server.
    // We extract it here and do a real form POST so the browser handles
    // the redirect and sets the cookie correctly.
    const hash   = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);
    const token  = params.get("access_token");
    const type   = params.get("type");

    if (token) {
        // Build a hidden form and submit it — real navigation, not fetch,
        // so the Set-Cookie header on the redirect is applied reliably.
        const form = document.createElement("form");
        form.method = "POST";
        form.action = "/auth/session";

        [["access_token", token], ["type", type || "signup"]].forEach(([k, v]) => {
            const input = document.createElement("input");
            input.type  = "hidden";
            input.name  = k;
            input.value = v;
            form.appendChild(input);
        });

        document.body.appendChild(form);
        form.submit();
    } else {
        document.getElementById("msg").textContent = "Invalid confirmation link.";
        setTimeout(() => { window.location.href = "/login"; }, 2000);
    }
</script>

{% endblock %}
